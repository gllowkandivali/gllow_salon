<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Gllow Salon</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        .dashboard {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        th {
            background-color: #ff4d6d;
            color: white;
        }

        tr:hover {
            background-color: #f9f9f9;
        }

        .logout {
            background: black;
            color: white;
            padding: 8px 15px;
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>

<body>

<div class="dashboard">

    <div class="top-bar">
        <h1>Bookings Dashboard 💇‍♀️</h1>
        <a href="/logout" class="logout">Logout</a>
    </div>

    {% if data and data|length > 0 %}
    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Service</th>
            <th>Date</th>
            <th>Time</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
            <td>{{ row[2] }}</td>
            <td>{{ row[3] }}</td>
            <td>{{ row[4] }}</td>
            <td>{{ row[5] }}</td>
        </tr>
        {% endfor %}
    </table>

    {% else %}
        <p style="margin-top:20px;">No bookings yet 😢</p>
    {% endif %}

</div>

</body>
</html>
